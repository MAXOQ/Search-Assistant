<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>My Extension</title>
    <style>
        body {
            background-color: black;
            color: white;
        }
    </style>
</head>

<body>
    <h3>SEARCH ASSISTANT</h3>
    <img src="icons/logo.svg">
    <div>
        <input type="text" id="search" placeholder="Enter your search">
        <button id="searchBtn">Search</button>
    </div>
    <span id="configToggle" style="cursor:pointer">
        config
    </span>
    <div id="configMenu" style="display:none">
        <input type="password" id="apikey" placeholder="Enter your OpenAI api key">
        <button id="showbtn">Show</button>
        <div style="color: grey; font-size: 11px;">You API key will only be stored localy on this device.<br> It will not be shared with anyone.</div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
